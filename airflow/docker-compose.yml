services:

  postgres:
    image: postgres:15
    container_name: olist_postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5434:5432"

    volumes:
      - olist_postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U airflow -d airflow"
        ]
      interval: 10s
      timeout: 5s
      retries: 5


  airflow-init:
    build:
      context: ..
      dockerfile: airflow/Dockerfile

    container_name: olist_airflow_init

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    command:
      - bash
      - -c
      - |
        airflow db migrate

        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email airflow@example.com || true


  airflow-webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile

    container_name: olist_airflow_webserver

    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      PROJECT_ROOT: /opt/airflow

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: olist
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow

    ports:
      - "8081:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

      - ../scripts:/opt/airflow/scripts
      - ../data:/opt/airflow/data
      - ../audit:/opt/airflow/audit
      - ../metadata:/opt/airflow/metadata

    command: webserver


  airflow-scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile

    container_name: olist_airflow_scheduler

    restart: unless-stopped

    depends_on:
      airflow-init:
        condition: service_completed_successfully

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      PROJECT_ROOT: /opt/airflow

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: olist
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

      - ../scripts:/opt/airflow/scripts
      - ../data:/opt/airflow/data
      - ../audit:/opt/airflow/audit
      - ../metadata:/opt/airflow/metadata

    command: scheduler


volumes:
  olist_postgres_data: