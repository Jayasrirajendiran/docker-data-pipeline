version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: airflow_postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5433:5432"

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.2

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@gmail.com
      "

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../scripts:/opt/airflow/scripts
      - ../data:/opt/airflow/data
      - ../metadata:/opt/airflow/metadata
      - ../audit:/opt/airflow/audit
      - ../sql:/opt/airflow/sql

  airflow-webserver:
    image: apache/airflow:2.9.2
    container_name: airflow_webserver

    restart: always

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    ports:
      - "8080:8080"

    command: webserver

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../scripts:/opt/airflow/scripts
      - ../data:/opt/airflow/data
      - ../metadata:/opt/airflow/metadata
      - ../audit:/opt/airflow/audit
      - ../sql:/opt/airflow/sql

  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: airflow_scheduler

    restart: always

    depends_on:
      - airflow-webserver

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    command: scheduler

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ../scripts:/opt/airflow/scripts
      - ../data:/opt/airflow/data
      - ../metadata:/opt/airflow/metadata
      - ../audit:/opt/airflow/audit
      - ../sql:/opt/airflow/sql

volumes:
  postgres-db-volume: